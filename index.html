                "Convert input to uppercase",
                "Wrap in quotes",
              ],
              answer: 1,
            },
            {
              q: "DDL statements (CREATE TABLE, DROP) in PL/SQL must use:",
              options: [
                "Regular PL/SQL",
                "EXECUTE IMMEDIATE",
                "DBMS_SQL only",
                "Cannot be done in PL/SQL",
              ],
              answer: 1,
            },
            {
              q: "DBMS_ASSERT.SQL_OBJECT_NAME validates that:",
              options: [
                "SQL syntax is correct",
                "The named object exists in the database",
                "String has no spaces",
                "Name is less than 30 chars",
              ],
              answer: 1,
            },
            {
              q: "OPEN ref_cursor FOR sql_string USING bind_val is used for:",
              options: [
                "Static queries",
                "DDL execution",
                "Dynamic multi-row queries",
                "DML statements only",
              ],
              answer: 2,
            },
            {
              q: "Table names in dynamic SQL cannot be bind variables because:",
              options: [
                "Performance reasons",
                "Bind variables are for values, not identifiers/syntax",
                "Oracle limitation since 12c",
                "They require DBMS_SQL instead",
              ],
              answer: 1,
            },
            {
              q: "After EXECUTE IMMEDIATE with INTO clause, SQL%ROWCOUNT contains:",
              options: [
                "Rows in full table",
                "1 if successful, 0 if not",
                "Number of bind variables",
                "Always NULL for SELECT",
              ],
              answer: 1,
            },
          ],
        },
      ]; // end LESSONS array
    </script>

    <script>
      // ═══════════════════════════════════════════════════
      // STATE
      // ═══════════════════════════════════════════════════
      let currentUser = null;
      let userProgress = {}; // { lessonId: { completed, xp, mcqScore, codeSubmitted } }
      let currentLessonId = -1;
      let totalXP = 0;

      const ITEMS_PER_LEVEL = 200;

      // ═══════════════════════════════════════════════════
      // FIREBASE HELPERS
      // ═══════════════════════════════════════════════════
      function fb() {
        return window._firebase || null;
      }

      // ═══════════════════════════════════════════════════
      // INIT — Always require sign-in, no demo fallback
      // ═══════════════════════════════════════════════════
      window.addEventListener("load", () => {
        // Always show auth screen immediately — NEVER demo mode
        // Just wait for Firebase to confirm who is logged in
        let waited = 0;
        const waitFB = setInterval(() => {
          waited += 100;

          // Firebase loaded and config is valid
          if (window._firebaseReady === true) {
            clearInterval(waitFB);
            hideLoading();
            initApp();
            return;
          }

          // Firebase config is bad / placeholder values still in file
          if (window._firebaseReady === false) {
            clearInterval(waitFB);
            hideLoading();
            showAuth();
            showMsg(
              "⚠️ Firebase config missing. Open your index.html, find the firebaseConfig block and paste your real values from Firebase Console.",
              "error"
            );
            return;
          }

          // Still loading Firebase JS (normal, takes 1-3s on first load)
          if (waited > 12000) {
            // After 12s still nothing — show auth with error, no demo mode ever
            clearInterval(waitFB);
            hideLoading();
            showAuth();
            showMsg(
              "⚠️ Could not connect to Firebase. Check your internet connection and Firebase config.",
              "error"
            );
          }
        }, 100);
      });

      function initApp() {
        const { auth, onAuthStateChanged } = fb();
        // onAuthStateChanged tells us if user is already logged in or not
        onAuthStateChanged(auth, async (user) => {
          hideLoading();
          if (user) {
            // Already signed in — go straight to app
            currentUser = user;
            await loadProgress();
            showApp();
          } else {
            // Not signed in — show sign-in screen (ALWAYS)
            showAuth();
          }
        });
      }

      function showMsg(text, type) {
        const el = document.getElementById("authMsg");
        if (!el) return;
        el.className = "auth-msg " + type;
        el.innerHTML = text;
      }

      function hideLoading() {
        const el = document.getElementById("loadingOverlay");
        if (el) {
          el.style.opacity = "0";
          setTimeout(() => el.remove(), 400);
        }
      }

      // ═══════════════════════════════════════════════════
      // AUTH
      // ═══════════════════════════════════════════════════
      function showAuth() {
        document.getElementById("authScreen").style.display = "flex";
        document.getElementById("app").style.display = "none";
      }

      function showApp() {
        document.getElementById("authScreen").style.display = "none";
        document.getElementById("app").style.display = "block";
        renderSidebar();
        showWelcome();
        updateHeaderXP();

        const name = currentUser.displayName || currentUser.email || "User";
        document.getElementById("userName").textContent = name.split(" ")[0];
        document.getElementById("userAvatar").textContent = name
          .charAt(0)
          .toUpperCase();
      }

      function switchAuthTab(tab) {
        document
          .querySelectorAll(".auth-tab")
          .forEach((t, i) =>
            t.classList.toggle(
              "active",
              (i === 0 && tab === "signin") || (i === 1 && tab === "signup")
            )
          );
        document.getElementById("signinForm").style.display =
          tab === "signin" ? "block" : "none";
        document.getElementById("signupForm").style.display =
          tab === "signup" ? "block" : "none";
        clearAuthMsg();
      }

      async function handleSignIn() {
        const email = document.getElementById("si_email").value.trim();
        const pass = document.getElementById("si_password").value;
        if (!email || !pass) {
          showAuthMsg("Please enter email and password", "error");
          return;
        }
        setAuthBtnLoading(true);
        try {
          await fb().signInWithEmailAndPassword(fb().auth, email, pass);
        } catch (e) {
          showAuthMsg(friendlyAuthError(e.code), "error");
        } finally {
          setAuthBtnLoading(false);
        }
      }

      async function handleSignUp() {
        const name = document.getElementById("su_name").value.trim();
        const email = document.getElementById("su_email").value.trim();
        const pass = document.getElementById("su_password").value;
        if (!name || !email || !pass) {
          showAuthMsg("All fields are required", "error");
          return;
        }
        if (pass.length < 6) {
          showAuthMsg("Password must be at least 6 characters", "error");
          return;
        }
        setAuthBtnLoading(true);
        try {
          const cred = await fb().createUserWithEmailAndPassword(
            fb().auth,
            email,
            pass
          );
          await fb().updateProfile(cred.user, { displayName: name });
          // Create progress doc
          const f = fb();
          await f.setDoc(f.doc(f.db, "users", cred.user.uid), {
            name,
            email,
            createdAt: f.serverTimestamp(),
            xp: 0,
            progress: {},
          });
          showAuthMsg(
            "Account created! Welcome to PL/SQL Academy 🎉",
            "success"
          );
        } catch (e) {
          showAuthMsg(friendlyAuthError(e.code), "error");
        } finally {
          setAuthBtnLoading(false);
        }
      }

      async function handleSignOut() {
        if (fb()) await fb().signOut(fb().auth);
        else {
          currentUser = null;
          showAuth();
        }
      }

      function friendlyAuthError(code) {
        const m = {
          "auth/user-not-found": "No account found with this email",
          "auth/wrong-password": "Incorrect password",
          "auth/email-already-in-use": "This email is already registered",
          "auth/weak-password": "Password should be at least 6 characters",
          "auth/invalid-email": "Invalid email address",
          "auth/invalid-credential": "Invalid email or password",
        };
        return m[code] || "Authentication failed. Please try again.";
      }

      function showAuthMsg(msg, type) {
        const el = document.getElementById("authMsg");
        el.textContent = msg;
        el.className = `auth-msg ${type}`;
      }

      function clearAuthMsg() {
        document.getElementById("authMsg").className = "auth-msg";
      }

      function setAuthBtnLoading(loading) {
        document
          .querySelectorAll(".btn-auth")
          .forEach((b) => (b.disabled = loading));
      }

      // ═══════════════════════════════════════════════════
      // PROGRESS (Firestore + localStorage fallback)
      // ═══════════════════════════════════════════════════
      async function loadProgress() {
        if (!fb() || !currentUser) return;
        try {
          const f = fb();
          const snap = await f.getDoc(f.doc(f.db, "users", currentUser.uid));
          if (snap.exists()) {
            const data = snap.data();
            userProgress = data.progress || {};
            totalXP = data.xp || 0;
          }
        } catch (e) {
          console.warn("Firestore load failed, using localStorage", e);
          userProgress = JSON.parse(
            localStorage.getItem("plsql_progress") || "{}"
          );
          totalXP = Object.values(userProgress).reduce(
            (s, p) => s + (p.xp || 0),
            0
          );
        }
      }

      async function saveProgress(lessonId, data) {
        userProgress[lessonId] = { ...userProgress[lessonId], ...data };
        totalXP = Object.values(userProgress).reduce(
          (s, p) => s + (p.xp || 0),
          0
        );

        // Save to localStorage always
        localStorage.setItem("plsql_progress", JSON.stringify(userProgress));

        // Try Firebase
        if (fb() && currentUser && currentUser.uid !== "local") {
          try {
            const f = fb();
            await f.updateDoc(f.doc(f.db, "users", currentUser.uid), {
              xp: totalXP,
              [`progress.${lessonId}`]: userProgress[lessonId],
            });
          } catch (e) {
            console.warn("Firebase save failed, local saved", e);
          }
        }
        updateHeaderXP();
        renderSidebar();
      }

      // ═══════════════════════════════════════════════════
      // HEADER XP
      // ═══════════════════════════════════════════════════
      function updateHeaderXP() {
        const level = Math.floor(totalXP / ITEMS_PER_LEVEL) + 1;
        const pct = ((totalXP % ITEMS_PER_LEVEL) / ITEMS_PER_LEVEL) * 100;
        document.getElementById("xpCount").textContent = totalXP + " XP";
        document.getElementById("xpBarFill").style.width = pct + "%";
        document.getElementById("levelPill").textContent = "L" + level;
      }

      // ═══════════════════════════════════════════════════
      // SIDEBAR
      // ═══════════════════════════════════════════════════
      function renderSidebar() {
        let html = "";
        let lastModule = "";

        LESSONS.forEach((lesson) => {
          if (lesson.module !== lastModule) {
            html += `<div class="sidebar-module">${lesson.module}</div>`;
            lastModule = lesson.module;
          }
          const prog = userProgress[lesson.id] || {};
          const done = prog.completed;
          const active = lesson.id === currentLessonId;
          const badge = done ? "✓" : `+${lesson.xp}`;
          const badgeClass = done ? "done" : active ? "active" : "locked";
          const itemClass = `nav-item ${active ? "active" : ""} ${
            done ? "completed" : ""
          }`;

          html += `
      <div class="${itemClass}" onclick="goToLesson(${lesson.id})">
        <span class="nav-icon">${lesson.icon}</span>
        <span class="nav-title">${lesson.title}</span>
        <span class="nav-badge ${badgeClass}">${badge}</span>
      </div>`;
        });
        document.getElementById("sidebar").innerHTML = html;
      }

      // ═══════════════════════════════════════════════════
      // WELCOME SCREEN
      // ═══════════════════════════════════════════════════
      function showWelcome() {
        currentLessonId = -1;
        renderSidebar();

        const modules = [...new Set(LESSONS.map((l) => l.module))];
        const completed = Object.values(userProgress).filter(
          (p) => p.completed
        ).length;
        const name = (currentUser?.displayName || "Student").split(" ")[0];

        const modCards = modules
          .map((m) => {
            const mLessons = LESSONS.filter((l) => l.module === m);
            const mDone = mLessons.filter(
              (l) => userProgress[l.id]?.completed
            ).length;
            return `
      <div class="module-card" onclick="goToLesson(${mLessons[0].id})">
        <div class="mc-icon">${mLessons[0].icon}</div>
        <h3>${m}</h3>
        <p>${mLessons.length} lessons covering core concepts with practice problems</p>
        <div class="mc-count">${mDone}/${mLessons.length} completed</div>
      </div>`;
          })
          .join("");

        document.getElementById("mainContent").innerHTML = `
    <div class="welcome-page">
      <div class="welcome-hero">
        <h1>Welcome back,<br><span class="grad">${name} 👋</span></h1>
        <p>Your interactive PL/SQL learning journey — from anonymous blocks to dynamic SQL, packages, and performance optimization. All progress saved to your account.</p>
      </div>

      <div class="welcome-stats">
        <div class="stat-card"><div class="stat-num">${
          LESSONS.length
        }</div><div class="stat-lbl">Total Lessons</div></div>
        <div class="stat-card"><div class="stat-num">${completed}</div><div class="stat-lbl">Completed</div></div>
        <div class="stat-card"><div class="stat-num">${totalXP}</div><div class="stat-lbl">Total XP</div></div>
        <div class="stat-card"><div class="stat-num">${Math.round(
          (completed / LESSONS.length) * 100
        )}%</div><div class="stat-lbl">Progress</div></div>
      </div>

      <div style="margin-bottom:20px;">
        <div class="section-header"><span class="sh-icon">📚</span> Modules</div>
        <div class="welcome-modules">${modCards}</div>
      </div>

      <button class="btn-big" onclick="goToLesson(${findNextLesson()})">
        ${completed === 0 ? "🚀 Start Learning" : "▶ Continue Learning"} →
      </button>
    </div>`;
      }

      function findNextLesson() {
        for (const l of LESSONS) {
          if (!userProgress[l.id]?.completed) return l.id;
        }
        return 0;
      }

      // ═══════════════════════════════════════════════════
      // LESSON RENDERER
      // ═══════════════════════════════════════════════════
      function goToLesson(id) {
        currentLessonId = id;
        const l = LESSONS.find((x) => x.id === id);
        if (!l) return;
        renderSidebar();
        renderLesson(l);
        document.getElementById("mainContent").scrollTo(0, 0);
      }

      function renderLesson(l) {
        const prog = userProgress[l.id] || {};
        const mcqAnswered = prog.mcqAnswers || {};
        const mcqScore = prog.mcqScore || 0;
        const diffStars =
          "★".repeat(l.difficulty) + "☆".repeat(5 - l.difficulty);

        // Progress dots
        const dots = LESSONS.map((x) => {
          const p = userProgress[x.id] || {};
          const cls = p.completed ? "done" : x.id === l.id ? "active" : "";
          return `<div class="prog-dot ${cls}"></div>`;
        }).join("");

        // Key points
        const kpHtml = l.keyPoints
          .map(
            (kp, i) => `
    <div class="keypoint-card" onclick="toggleKP(this)">
      <div class="kp-short">
        <span>💡 ${kp.short}</span>
        <span class="kp-arrow">▼</span>
      </div>
      <div class="kp-detail">${kp.detail}</div>
    </div>`
          )
          .join("");

        // MCQ
        const mcqHtml = l.mcq
          .map((q, qi) => {
            const answered = mcqAnswered[qi] !== undefined;
            const optHtml = q.options
              .map((opt, oi) => {
                let cls = answered
                  ? (oi === q.answer
                      ? "correct"
                      : mcqAnswered[qi] === oi
                      ? "wrong"
                      : "") + " answered"
                  : "";
                return `
        <div class="mcq-option ${cls}" onclick="checkMCQ(${
                  l.id
                }, ${qi}, ${oi}, ${q.answer}, this)">
          <span class="mcq-opt-letter">${String.fromCharCode(65 + oi)}</span>
          ${opt}
        </div>`;
              })
              .join("");

            return `
      <div class="mcq-question" id="mcq_${l.id}_${qi}">
        <div class="mcq-q-text"><span class="mcq-q-num">Q${qi + 1}</span>${
              q.q
            }</div>
        <div class="mcq-options">${optHtml}</div>
        <div class="mcq-explanation" id="mcqExp_${l.id}_${qi}">
          ✅ Correct! ${
            answered && mcqAnswered[qi] === q.answer
              ? "Well done!"
              : "The answer is option " +
                String.fromCharCode(65 + q.answer) +
                "."
          }
        </div>
      </div>`;
          })
          .join("");

        // YouTube search panel — uses search queries, never breaks
        const ytQueries = buildYTQueries(l.title, l.module);
        const ytHtml = `
    <div>
      <div class="section-header"><span class="sh-icon">🎥</span> Learn by Watching — YouTube Resources</div>
      <div class="yt-search-panel">
        <div class="yt-search-top">
          <div class="yt-logo-big">▶</div>
          <div class="yt-search-text">
            <h4>Watch "${l.title}" Tutorials</h4>
            <p>Click any search below to find the best current videos on YouTube. Results always up to date — no broken links.</p>
          </div>
        </div>
        <div class="yt-search-queries">
          ${ytQueries
            .map(
              (q) => `
            <a class="yt-query-btn" href="${q.url}" target="_blank" rel="noopener">
              <div class="yt-query-left">
                <div class="yt-query-icon">${q.icon}</div>
                <span>${q.label}</span>
              </div>
              <span class="yt-query-arrow">↗</span>
            </a>`
            )
            .join("")}
        </div>
        <div class="yt-footer-note">
          🔍 Opens YouTube search in a new tab · Best channels:
          <a href="https://www.youtube.com/@RebellionRider" target="_blank">RebellionRider</a>,
          <a href="https://www.youtube.com/@WilliamRobertsonOracle" target="_blank">William Robertson</a>,
          <a href="https://www.youtube.com/results?search_query=oracle+plsql+tutorial" target="_blank">Oracle PL/SQL tutorials</a>
        </div>
      </div>
    </div>`;

        // Highlight code
        const hiCode = highlightSQL(l.codeExample);

        document.getElementById("mainContent").innerHTML = `
    <div class="lesson-page active" id="lessonPage">

      <!-- Hero -->
      <div class="lesson-hero">
        <div class="lesson-icon-wrap">${l.icon}</div>
        <div>
          <div class="lesson-meta-row">
            <span class="pill pill-${l.level}">${l.level}</span>
            <span class="pill pill-xp">+${l.xp} XP</span>
            <span class="pill pill-diff">${diffStars}</span>
            ${
              prog.completed
                ? '<span class="pill" style="background:rgba(16,185,129,0.12);color:var(--success);border:1px solid rgba(16,185,129,0.2);">✓ Completed</span>'
                : ""
            }
          </div>
          <div class="lesson-title">${l.icon} ${l.title}</div>
          <div style="margin-top:6px;font-size:12px;color:var(--text2);">${
            l.module
          }</div>
        </div>
      </div>

      <!-- Key Points -->
      <div>
        <div class="section-header"><span class="sh-icon">🎯</span> Key Concepts — Click to expand</div>
        <div class="keypoints-grid">${kpHtml}</div>
      </div>

      <!-- Code Example -->
      <div>
        <div class="section-header"><span class="sh-icon">💻</span> Code Example</div>
        <div class="code-block">
          <div class="code-topbar">
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="code-dots"><div class="cdot cdot-r"></div><div class="cdot cdot-y"></div><div class="cdot cdot-g"></div></div>
              <span class="code-label">${l.title} — Example</span>
            </div>
            <button class="btn-copy" onclick="copyCode(this)">Copy</button>
          </div>
          <pre class="code-pre">${hiCode}</pre>
        </div>
      </div>

      <!-- Explanation -->
      <div class="explanation-box">${l.explanation}</div>

      <!-- YouTube (if any) -->
      ${ytHtml}

      <!-- Practice Problem -->
      <div>
        <div class="section-header"><span class="sh-icon">🎯</span> Practice Problem</div>
        <div class="problem-box">
          <div class="problem-header">
            <span>🧩</span>
            <h3>${l.problem.title}</h3>
          </div>
          <div class="problem-body">
            <div class="problem-desc">${l.problem.description}</div>

            <div class="editor-wrap">
              <div class="editor-toolbar">
                <div class="editor-indicator">Write your PL/SQL here</div>
                <div class="editor-btns">
                  <button class="btn btn-hint" onclick="getHint(${
                    l.id
                  })">💡 Hint</button>
                  <button class="btn btn-secondary" onclick="showSolution(${
                    l.id
                  })">👁 Solution</button>
                  <button class="btn btn-secondary" onclick="clearEditor()">⊘ Clear</button>
                  <button class="btn btn-run" id="runBtn_${
                    l.id
                  }" onclick="runCode(${l.id})">▶ Run</button>
                  <button class="btn btn-primary" onclick="submitCode(${
                    l.id
                  })">★ Submit &amp; Review</button>
                </div>
              </div>
              <textarea class="code-editor" id="codeEditor_${l.id}" 
                placeholder="${l.problem.starterCode}" spellcheck="false"
              >${prog.lastCode || ""}</textarea>
            </div>

            <!-- OUTPUT BOX -->
            <div class="output-box" id="outputBox_${l.id}">
              <div class="output-topbar">
                <div class="output-topbar-left">
                  <div class="output-run-dot" id="outputDot_${l.id}"></div>
                  <span id="outputLabel_${l.id}">Output</span>
                </div>
                <button class="output-clear-btn" onclick="clearOutput(${
                  l.id
                })">✕ Clear</button>
              </div>
              <div class="output-content" id="outputContent_${l.id}"></div>
              <div class="output-status-bar">
                <span id="outputMeta_${l.id}">Ready</span>
                <span id="outputTime_${l.id}"></span>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- AI Panel -->
      <div class="ai-panel" id="aiPanel_${l.id}">
        <div class="ai-panel-header" id="aiPanelHeader_${l.id}">
          <span>🤖</span> AI Code Review
          <span id="execStatus_${l.id}"></span>
        </div>
        <div class="ai-thinking" id="aiThinking_${l.id}" style="display:none;">
          <div class="spinner"></div> Analyzing your PL/SQL code...
        </div>
        <div class="ai-body" id="aiBody_${l.id}"></div>
      </div>

      <!-- MCQ -->
      <div>
        <div class="section-header"><span class="sh-icon">❓</span> Knowledge Check — ${
          l.mcq.length
        } Questions</div>
        <div class="mcq-section">
          <div class="mcq-header">
            <h3>❓ Multiple Choice Questions</h3>
            <span class="mcq-score" id="mcqScore_${l.id}">Score: ${mcqScore}/${
          l.mcq.length
        }</span>
          </div>
          <div class="mcq-body">${mcqHtml}</div>
        </div>
      </div>

      <!-- Ask AI -->
      <div class="ask-section">
        <div class="ask-header">🤖 Ask AI — Any question about ${l.title}</div>
        <div class="ask-input-row">
          <input class="ask-input" id="askInput_${l.id}" 
            placeholder="e.g. 'What is the difference between %TYPE and %ROWTYPE?'"
            onkeydown="if(event.key==='Enter') askAI(${l.id})">
          <button class="ask-send" onclick="askAI(${l.id})">➤</button>
        </div>
        <div class="ask-response" id="askResp_${l.id}"></div>
      </div>

      <!-- Navigation -->
      <div class="lesson-nav">
        <button class="btn btn-secondary" onclick="prevLesson()" ${
          l.id === 0 ? "disabled" : ""
        }>← Prev</button>
        <div class="progress-track">${dots}</div>
        <button class="btn btn-primary" onclick="nextLesson()">Next →</button>
      </div>

    </div>`;

        // Restore MCQ visual state
        Object.entries(mcqAnswered).forEach(([qi, chosen]) => {
          const q = l.mcq[parseInt(qi)];
          if (!q) return;
          document

      // ═══════════════════════════════════════════════════
      // PL/SQL OUTPUT SIMULATOR — runCode()
      // Parses DBMS_OUTPUT.PUT_LINE calls and simulates
      // variable assignments, loops, conditions to produce
      // real-looking console output from the student's code
      // ═══════════════════════════════════════════════════

      function clearOutput(lessonId) {

      function runCode(lessonId) {
        const l = LESSONS.find((x) => x.id === lessonId);
        const code = document
          .getElementById(`codeEditor_${lessonId}`)
          ?.value?.trim();
        if (!l || !code) {
          showToast("Write some code first!", "error");
          return;
        }

        const runBtn = document.getElementById(`runBtn_${lessonId}`);
        runBtn.classList.add("running");
        runBtn.textContent = "⏳ Running...";
        runBtn.disabled = true;

        const box = document.getElementById(`outputBox_${lessonId}`);
        const content = document.getElementById(`outputContent_${lessonId}`);
        const dot = document.getElementById(`outputDot_${lessonId}`);
        const label = document.getElementById(`outputLabel_${lessonId}`);
        const meta = document.getElementById(`outputMeta_${lessonId}`);
        const timeEl = document.getElementById(`outputTime_${lessonId}`);

        box.classList.add("visible");
        content.innerHTML = "";
        dot.className = "output-run-dot running";
        label.textContent = "Running...";
        meta.textContent = "Executing PL/SQL block...";

        const t0 = performance.now();

        setTimeout(() => {
          try {
            const lines = simulatePLSQL(code, l);
            const elapsed = ((performance.now() - t0) / 1000 + 0.08).toFixed(3);

            content.innerHTML = "";
            lines.forEach(({ text, type }) => {
              const span = document.createElement("span");
              span.className = `out-line ${type}`;
              span.textContent = text;
              content.appendChild(span);
              content.appendChild(document.createTextNode("\n"));
            });

            const hasErrors = lines.some((l) => l.type === "err");
            const hasWarning = lines.some((l) => l.type === "warn");

            if (hasErrors) {
              dot.className = "output-run-dot error";
              label.textContent = "❌ Completed with errors";
              meta.textContent = `${
                lines.filter((l) => l.type === "err").length
              } error(s) found`;
            } else if (hasWarning) {
              dot.className = "output-run-dot";
              dot.style.background = "var(--accent)";
              label.textContent = "⚠️ Completed with warnings";
              meta.textContent = "Review warnings above";
            } else {
              dot.className = "output-run-dot";
              label.textContent = "✅ PL/SQL block completed";
              meta.textContent = `${
                lines.filter((l) => l.type === "ok" || l.type === "").length
              } line(s) of output`;
            }

            timeEl.textContent = `Elapsed: ${elapsed}s`;
          } catch (e) {
            content.innerHTML = `<span class="out-line err">Runtime Error: ${e.message}</span>`;
            dot.className = "output-run-dot error";
            label.textContent = "❌ Execution failed";
            meta.textContent = e.message;
          }

          runBtn.classList.remove("running");
          runBtn.textContent = "▶ Run";
          runBtn.disabled = false;
          // scroll output into view
          box.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }, 320);
      }

      // ─────────────────────────────────────────────────────
      // Core PL/SQL Simulator
      // ─────────────────────────────────────────────────────
      function simulatePLSQL(code, lesson) {
        const lines = [];
        const vars = {}; // variable store: name → value
        const errors = [];

        const out = (text, type = "") => lines.push({ text, type });
        const err = (text) => lines.push({ text: "⚠ " + text, type: "err" });
        const info = (text) => lines.push({ text, type: "info" });
        const meta = (text) => lines.push({ text, type: "meta" });

        // ── Header ──
        meta("SQL> SET SERVEROUTPUT ON");
        meta("SQL> -- Executing PL/SQL block...");
        out("");

        // ── Detect basic syntax errors ──
        const upperCode = code.toUpperCase();

        if (!upperCode.includes("BEGIN")) {
          err("PLS-00103: Encountered END without BEGIN");
          err("Hint: Every PL/SQL block needs BEGIN ... END;");
          return lines;
        }
        if (!upperCode.includes("END")) {
          err("PLS-00103: Missing END; statement");
          return lines;
        }
        if (upperCode.includes("BEGIN") && !upperCode.match(/END\s*;/)) {
          err("PLS-00103: END must be followed by semicolon — use END;");
        }

        // ── Parse DECLARE section ──
        const declareMatch = code.match(/DECLARE([\s\S]*?)BEGIN/i);
        if (declareMatch) {
          const declBlock = declareMatch[1];
          // Parse variable declarations: name type [:= value];
          const varDecls = declBlock.matchAll(
            /(\w+)\s+(?:CONSTANT\s+)?(?:VARCHAR2\(\d+\)|NUMBER(?:\(\d+(?:,\d+)?\))?|DATE|BOOLEAN|PLS_INTEGER|INTEGER)\s*(?::=\s*([^;]+?))?;/gi
          );
          for (const m of varDecls) {
            const vname = m[1].toLowerCase();
            let vval = m[2] ? m[2].trim() : null;
            if (vval !== null) {
              vval = evalSimpleExpr(vval, vars);
            }
            vars[vname] = vval;
          }
        }

        // ── Parse BEGIN...END block ──
        let beginMatch = code.match(
          /BEGIN([\s\S]*?)(?:EXCEPTION[\s\S]*?)?END\s*(?:\w+)?\s*;/i
        );
        if (!beginMatch) {
          err("PLS-00103: Could not parse BEGIN...END block");
          return lines;
        }

        let body = beginMatch[1];

        // ── Execute DBMS_OUTPUT.PUT_LINE statements ──
        // Support nested || and variable references
        const putLineRe = /DBMS_OUTPUT\.PUT_LINE\s*\(([^;]+?)\)\s*;/gi;
        let putMatch;
        let outputCount = 0;

        // Extract all PUT_LINE calls in order
        const allStatements = extractStatements(body, vars);
        allStatements.forEach((stmt) => {
          out(stmt, "");
          outputCount++;
        });

        if (outputCount === 0 && !errors.length) {
          out("(No DBMS_OUTPUT.PUT_LINE found in code)", "meta");
          out(
            "Tip: Use DBMS_OUTPUT.PUT_LINE('your message'); to print output",
            "info"
          );
        }

        // ── Footer ──
        out("");
        meta("PL/SQL procedure successfully completed.");
        out("");
        meta(`SQL> -- ${outputCount} line(s) output`);

        return lines;
      }

      // ─────────────────────────────────────────────────────
      // Statement extractor — walks the code and collects
      // DBMS_OUTPUT.PUT_LINE output, resolving variables
      // ─────────────────────────────────────────────────────
      function extractStatements(body, vars) {
        const results = [];

        // Resolve a concatenation expression like 'text' || v_var || num
        function resolveExpr(expr) {
          expr = expr.trim();
          // Split on || but keep parts
          const parts = splitConcat(expr);
          return parts
            .map((p) => {
              p = p.trim();
              // String literal
              if (/^'(.*)'$/.test(p)) return p.slice(1, -1);
              // Number literal
              if (/^-?\d+(\.\d+)?$/.test(p)) return p;
              // SYSDATE
              if (/^SYSDATE$/i.test(p))
                return new Date().toLocaleDateString("en-IN");
              // USER
              if (/^USER$/i.test(p)) return "PLSQL_STUDENT";
              // ROUND(x, n)
              const roundM = p.match(/^ROUND\(([^,]+),?\s*(\d+)?\)$/i);
              if (roundM) {
                const v = parseFloat(resolveExpr(roundM[1])) || 0;
                const d = parseInt(roundM[2] ?? 2);
                return isNaN(v) ? "0" : v.toFixed(d);
              }
              // TO_CHAR(x)
              const tcM = p.match(/^TO_CHAR\(([^)]+)\)$/i);
              if (tcM) return resolveExpr(tcM[1]);
              // NVL(x, y)
              const nvlM = p.match(/^NVL\(([^,]+),\s*([^)]+)\)$/i);
              if (nvlM) {
                const v = resolveExpr(nvlM[1]);
                return v === null || v === "NULL" || v === ""
                  ? resolveExpr(nvlM[2])
                  : v;
              }
              // Arithmetic: a * b, a + b, a - b, a / b
              const arithM = p.match(/^(.+?)\s*([\+\-\*\/])\s*(.+)$/);
              if (arithM) {
                const a = parseFloat(resolveExpr(arithM[1]));
                const b = parseFloat(resolveExpr(arithM[3]));
                if (!isNaN(a) && !isNaN(b)) {
                  const op = arithM[2];
                  const r =
                    op === "+"
                      ? a + b
                      : op === "-"
                      ? a - b
                      : op === "*"
                      ? a * b
                      : op === "/"
                      ? a / b
                      : a;
                  return String(Math.round(r * 100) / 100);
                }
              }
              // Variable lookup (case-insensitive)
              const key = p.toLowerCase().replace(/^:new\.|^:old\./, "");
              if (vars.hasOwnProperty(key) && vars[key] !== null)
                return String(vars[key]);
              // Boolean/NULL keywords
              if (/^TRUE$/i.test(p)) return "TRUE";
              if (/^FALSE$/i.test(p)) return "FALSE";
              if (/^NULL$/i.test(p)) return "NULL";
              // Return as-is if unresolvable (might be a DB-dependent value)
              return p;
            })
            .join("");
        }

        // Split on top-level ||
        function splitConcat(s) {
          const parts = [];
          let depth = 0;
          let cur = "";
          for (let i = 0; i < s.length; i++) {
            if (s[i] === "(") {
              depth++;
              cur += s[i];
            } else if (s[i] === ")") {
              depth--;
              cur += s[i];
            } else if (s[i] === "|" && s[i + 1] === "|" && depth === 0) {
              parts.push(cur);
              cur = "";
              i++;
            } else {
              cur += s[i];
            }
          }
          if (cur.trim()) parts.push(cur);
          return parts;
        }

        // ── Process variable assignments (v_x := expr;) ──
        function applyAssignments(block) {
          const assignRe = /(\w+)\s*:=\s*([^;]+);/g;
          let m;
          while ((m = assignRe.exec(block)) !== null) {
            const name = m[1].toLowerCase();
            if (
              [
                "if",
                "elsif",
                "while",
                "loop",
                "for",
                "begin",
                "end",
                "exception",
                "when",
                "then",
                "else",
              ].includes(name)
            )
              continue;
            try {
              vars[name] = resolveExpr(m[2].trim());
            } catch (e) {}
          }
        }

        // ── Handle FOR i IN low..high loops ──
        const forLoopRe =
          /FOR\s+(\w+)\s+IN\s+(REVERSE\s+)?(\d+)\.\.(\d+)\s+LOOP([\s\S]*?)END\s+LOOP\s*;/gi;
        let cleanBody = body;

        cleanBody = cleanBody.replace(
          forLoopRe,
          (_, counter, rev, lowStr, highStr, loopBody) => {
            let lo = parseInt(lowStr),
              hi = parseInt(highStr);
            if (rev) [lo, hi] = [hi, lo];
            const step = rev ? -1 : 1;
            const limit = Math.min(Math.abs(hi - lo) + 1, 20); // cap at 20 iterations
            let iterations = 0;
            for (let i = lo; rev ? i >= hi : i <= hi; i += step) {
              if (++iterations > limit) {
                results.push("... (loop continues)");
                break;
              }
              vars[counter.toLowerCase()] = i;
              // Inline assignments in loop body
              applyAssignments(loopBody);
              // Extract PUT_LINE from this iteration
              const pRe = /DBMS_OUTPUT\.PUT_LINE\s*\(([^;]+?)\)\s*;/gi;
              let pm;
              while ((pm = pRe.exec(loopBody)) !== null) {
                results.push(resolveExpr(pm[1]));
              }
            }
            return ""; // remove processed loop from body
          }
        );

        // ── Handle WHILE loops (simple counter detection) ──
        const whileRe = /WHILE\s+(.+?)\s+LOOP([\s\S]*?)END\s+LOOP\s*;/gi;
        cleanBody = cleanBody.replace(whileRe, (_, cond, loopBody) => {
          let maxIter = 15;
          applyAssignments(loopBody);
          const pRe = /DBMS_OUTPUT\.PUT_LINE\s*\(([^;]+?)\)\s*;/gi;
          let pm,
            count = 0;
          // Just execute body up to maxIter times (simulate)
          while (count++ < maxIter) {
            applyAssignments(loopBody);
            while ((pm = pRe.exec(loopBody)) !== null) {
              results.push(resolveExpr(pm[1]));
            }
            pRe.lastIndex = 0;
            // Check if we should break — look for a counter being incremented
            const hasExit = /EXIT\s+WHEN|EXIT\s*;/i.test(loopBody);
            if (hasExit && count >= 5) break; // limit simulation
          }
          if (count >= maxIter)
            results.push(
              "... (loop output truncated at " + maxIter + " iterations)"
            );
          return "";
        });

        // ── Handle IF/ELSIF/ELSE blocks ──
        applyAssignments(cleanBody);

        // ── Finally extract all remaining PUT_LINE calls in order ──
        const putRe = /DBMS_OUTPUT\.PUT_LINE\s*\(([^;]+?)\)\s*;/gi;
        let pm;
        while ((pm = putRe.exec(cleanBody)) !== null) {
          results.push(resolveExpr(pm[1]));
        }

        return results;
      }

      // ── Evaluate a simple expression with known vars ──
      function evalSimpleExpr(expr, vars) {
        expr = expr.trim();
        if (/^'(.*)'$/.test(expr)) return expr.slice(1, -1);
        if (/^-?\d+(\.\d+)?$/.test(expr)) return parseFloat(expr);
        if (/^TRUE$/i.test(expr)) return true;
        if (/^FALSE$/i.test(expr)) return false;
        if (/^NULL$/i.test(expr)) return null;
        if (/^SYSDATE$/i.test(expr))
          return new Date().toLocaleDateString("en-IN");
        const key = expr.toLowerCase();
        if (vars.hasOwnProperty(key)) return vars[key];
        // Simple arithmetic
        const m = expr.match(/^(.+?)\s*([\+\-\*\/])\s*(.+)$/);
        if (m) {
          const a = parseFloat(evalSimpleExpr(m[1], vars));
          const b = parseFloat(evalSimpleExpr(m[3], vars));
          if (!isNaN(a) && !isNaN(b)) {
            return m[2] === "+"
              ? a + b
              : m[2] === "-"
              ? a - b
              : m[2] === "*"
              ? a * b
              : a / b;
          }
        }
        return expr;
      }

Topic: ${l.module}

PROBLEM STATEMENT:
${l.problem.description}

STUDENT'S CODE:
\`\`\`sql
${code}
\`\`\`

${l.problem.solution}
\`\`\`

        if (currentLessonId > 0) goToLesson(currentLessonId - 1);
        else showWelcome();
      }

      function nextLesson() {
        const nextId = currentLessonId + 1;
        if (nextId < LESSONS.length) {
          // Mark current as completed
          markComplete(currentLessonId);
          goToLesson(nextId);
        } else {
          markComplete(currentLessonId);
          showToast(
            "🏆 You completed all lessons! Congratulations!",
            "success"
          );
        }
      }

      async function markComplete(lessonId) {
        const l = LESSONS.find((x) => x.id === lessonId);
        if (!l || userProgress[lessonId]?.completed) return;
        await saveProgress(lessonId, {
          completed: true,
          completedAt: new Date().toISOString(),
          xp: l.xp,
        });
      }

      // ═══════════════════════════════════════════════════
      // CODE COPY
      // ═══════════════════════════════════════════════════
      // ═══════════════════════════════════════════════════
      // YOUTUBE SEARCH QUERY BUILDER
      // Generates YouTube search URLs — never breaks!
      // ═══════════════════════════════════════════════════
      function buildYTQueries(title, module) {
        const base = "https://www.youtube.com/results?search_query=";
        const enc = (s) => encodeURIComponent(s);

        // Generic + topic-specific queries
        const queries = [
          {
            icon: "🎓",
            label: `Oracle PL/SQL — ${title} Tutorial`,
            url: base + enc(`Oracle PL/SQL ${title} tutorial`),
          },
          {
            icon: "🟥",
            label: `RebellionRider: ${title}`,
            url: base + enc(`RebellionRider Oracle PL/SQL ${title}`),
          },
          {
            icon: "📺",
            label: `${title} — Full Explanation with Examples`,
            url: base + enc(`Oracle PLSQL ${title} explained examples 2024`),
          },
        ];

        // Add module-specific searches
        if (module.includes("Foundations")) {
          queries.push({
            icon: "🏁",
            label: "PL/SQL for Absolute Beginners (Hindi/English)",
            url: base + enc("Oracle PLSQL tutorial beginners Hindi 2024"),
          });
        } else if (module.includes("Loops")) {
          queries.push({
            icon: "🔁",
            label: "PL/SQL Loops: LOOP, WHILE, FOR Comparison",
            url: base + enc("Oracle PLSQL loop while for loop examples"),
          });
        } else if (module.includes("Data Access") || title.includes("Cursor")) {
          queries.push({
            icon: "🗄️",
            label: "PL/SQL Cursors — Explicit & Implicit",
            url: base + enc("Oracle PLSQL cursor explicit implicit for loop"),
          });
        } else if (module.includes("Exception")) {
          queries.push({
            icon: "🛡️",
            label: "PL/SQL Exception Handling Deep Dive",
            url:
              base +
              enc("Oracle PLSQL exception handling predefined user defined"),
          });
        } else if (
          module.includes("Stored") ||
          title.includes("Procedure") ||
          title.includes("Function")
        ) {
          queries.push({
            icon: "⚙️",
            label: "Stored Procedures vs Functions — Difference",
            url:
              base +
              enc("Oracle PLSQL stored procedure vs function difference"),
          });
        } else if (module.includes("Package")) {
          queries.push({
            icon: "📦",
            label: "PL/SQL Packages — Spec and Body",
            url: base + enc("Oracle PLSQL package specification body example"),
          });
        } else if (module.includes("Trigger")) {
          queries.push({
            icon: "⚡",
            label: "PL/SQL Triggers — Real World Examples",
            url:
              base +
              enc("Oracle PLSQL triggers before after row statement level"),
          });
        } else if (module.includes("Collection") || title.includes("Bulk")) {
          queries.push({
            icon: "🚀",
            label: "BULK COLLECT & FORALL Performance",
            url: base + enc("Oracle PLSQL bulk collect forall performance"),
          });
        } else if (title.includes("Dynamic")) {
          queries.push({
            icon: "💡",
            label: "Dynamic SQL — EXECUTE IMMEDIATE",
            url:
              base + enc("Oracle PLSQL execute immediate dynamic sql examples"),
          });
        }

        return queries;
      }

      function copyCode(btn) {
        const pre = btn.closest(".code-block").querySelector(".code-pre");
        navigator.clipboard.writeText(pre.textContent).then(() => {
          btn.textContent = "Copied!";
          btn.classList.add("copied");
          setTimeout(() => {
            btn.textContent = "Copy";
            btn.classList.remove("copied");
          }, 2000);
        });
      }

      // ═══════════════════════════════════════════════════
      // SYNTAX HIGHLIGHTER
      // ═══════════════════════════════════════════════════
      function highlightSQL(code) {
        const KEYWORDS = [
          "DECLARE",
          "BEGIN",
          "END",
          "IS",
          "AS",
          "PROCEDURE",
          "FUNCTION",
          "TRIGGER",
          "PACKAGE",
          "PACKAGE BODY",
          "CURSOR",
          "RETURN",
          "IF",
          "THEN",
          "ELSIF",
          "ELSE",
          "END IF",
          "CASE",
          "WHEN",
          "END CASE",
          "LOOP",
          "EXIT WHEN",
          "EXIT",
          "END LOOP",
          "FOR",
          "IN",
          "WHILE",
          "OPEN",
          "FETCH",
          "CLOSE",
          "INTO",
          "BULK COLLECT",
          "FORALL",
          "SAVE EXCEPTIONS",
          "SELECT",
          "INSERT",
          "UPDATE",
          "DELETE",
          "FROM",
          "WHERE",
          "ORDER BY",
          "GROUP BY",
          "HAVING",
          "JOIN",
          "LEFT JOIN",
          "RIGHT JOIN",
          "INNER JOIN",
          "ON",
          "SET",
          "VALUES",
          "COMMIT",
          "ROLLBACK",
          "SAVEPOINT",
          "ROLLBACK TO",
          "RAISE",
          "RAISE_APPLICATION_ERROR",
          "EXCEPTION",
          "WHEN",
          "OTHERS",
          "NULL",
          "TRUE",
          "FALSE",
          "NOT",
          "AND",
          "OR",
          "LIKE",
          "IN",
          "IS NULL",
          "IS NOT NULL",
          "CREATE OR REPLACE",
          "CREATE",
          "ALTER",
          "DROP",
          "TABLE",
          "INDEX",
          "VIEW",
          "SEQUENCE",
          "NEXTVAL",
          "CURRVAL",
          "OF",
          "REVERSE",
          "PRAGMA",
          "EXCEPTION_INIT",
          "CONSTANT",
          "DEFAULT",
          "NOCOPY",
          "OUT",
          "EACH ROW",
          "BEFORE",
          "AFTER",
          "EXECUTE IMMEDIATE",
          "USING",
          "AUTHID",
          "CURRENT_USER",
          "DEFINER",
          "SERIALLY_REUSABLE",
          "DETERMINISTIC",
          "PIPELINED",
          "PIPE ROW",
          "RETURNING",
          "INSERTING",
          "UPDATING",
          "DELETING",
          "AUTONOMOUS_TRANSACTION",
        ];

        const TYPES = [
          "NUMBER",
          "VARCHAR2",
          "VARCHAR",
          "CHAR",
          "DATE",
          "TIMESTAMP",
          "BOOLEAN",
          "INTEGER",
          "PLS_INTEGER",
          "BINARY_INTEGER",
          "LONG",
          "RAW",
          "BLOB",
          "CLOB",
          "NCLOB",
          "ROWTYPE",
          "TYPE",
          "TABLE",
          "INDEX BY",
          "VARRAY",
          "RECORD",
          "SYS_REFCURSOR",
          "ROWID",
        ];

        const FUNCS = [
          "DBMS_OUTPUT",
          "PUT_LINE",
          "SYSDATE",
          "SYSTIMESTAMP",
          "ROUND",
          "TRUNC",
          "LENGTH",
          "SUBSTR",
          "INSTR",
          "UPPER",
          "LOWER",
          "TRIM",
          "LTRIM",
          "RTRIM",
          "TO_CHAR",
          "TO_NUMBER",
          "TO_DATE",
          "NVL",
          "NVL2",
          "NULLIF",
          "COALESCE",
          "DECODE",
          "COUNT",
          "SUM",
          "AVG",
          "MIN",
          "MAX",
          "EXTRACT",
          "MOD",
          "POWER",
          "SQRT",
          "ABS",
          "REPLACE",
          "LPAD",
          "RPAD",
          "CHR",
          "ASCII",
          "ROWNUM",
          "ROWID",
          "USER",
          "SQLERRM",
          "SQLCODE",
          "SQL%ROWCOUNT",
          "SQL%FOUND",
          "SQL%NOTFOUND",
          "SQL%BULK_EXCEPTIONS",
          "DBMS_ASSERT",
          "SQL_OBJECT_NAME",
          "SIMPLE_SQL_NAME",
        ];

        // Escape HTML
        let s = code
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

        // Comments
        s = s.replace(/(--[^\n]*)/g, `<span class="com">$1</span>`);

        // Strings
        s = s.replace(/'([^']*)'/g, `<span class="str">'$1'</span>`);

        // Keywords (word boundary, case insensitive)
        KEYWORDS.forEach((kw) => {
          const re = new RegExp(`\\b(${kw})\\b`, "gi");
          s = s.replace(re, (m) => `<span class="kw">${m}</span>`);
        });

        // Types
        TYPES.forEach((t) => {
          const re = new RegExp(`\\b(${t})\\b`, "gi");
          s = s.replace(re, (m, p1) => `<span class="type">${m}</span>`);
        });

        // Numbers
        s = s.replace(/\b(\d+(?:\.\d+)?)\b/g, `<span class="num">$1</span>`);

        // Function calls
        FUNCS.forEach((fn) => {
          const re = new RegExp(`\\b(${fn.replace(".", "\\.")})\\b`, "gi");
          s = s.replace(re, (m) => `<span class="fn">${m}</span>`);
        });

        return s;
      }

      // ═══════════════════════════════════════════════════
      // TOAST
      // ═══════════════════════════════════════════════════
      let toastTimer = null;
      function showToast(msg, type = "info") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = `toast ${type} show`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove("show"), 3500);
      }
    </script>
  </body>
