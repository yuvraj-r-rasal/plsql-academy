     Get them from: Firebase Console → Project Settings
     → Your Apps → Web App → firebaseConfig
═══════════════════════════════════════════════════════ -->
    <script>
      window._FIREBASE_CONFIG = {
        apiKey: "AIzaSyCOftroFvtObs9ZBrAPw9AhrX8B48yexxc",
        authDomain: "plsql-academy.firebaseapp.com",
        projectId: "plsql-academy",
        storageBucket: "plsql-academy.firebasestorage.app",

    <!-- Firebase Compat SDK (no imports, no module conflicts) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
      (function () {
        var cfg = window._FIREBASE_CONFIG;
        var missing =
          !cfg ||
          Object.values(cfg).some(function (v) {
            return (
              !v || v.indexOf("REPLACE_WITH") === 0 || v.indexOf("YOUR_") >= 0
            );
          });

        if (missing) {
          console.warn("Firebase config not set — running in local mode");
          window._firebaseReady = false;
          return;
        }

        try {
          // Prevent duplicate app error if script runs twice
          var app = firebase.apps.length
            ? firebase.apps[0]
            : firebase.initializeApp(cfg);

          var auth = firebase.auth(app);
          var db = firebase.firestore(app);

          // Wrap compat API to match the interface the app expects
          window._firebase = {
            auth: auth,
            db: db,

            // Auth methods
            createUserWithEmailAndPassword: function (a, email, pass) {
              return a.createUserWithEmailAndPassword(email, pass);
            },
            signInWithEmailAndPassword: function (a, email, pass) {
              return a.signInWithEmailAndPassword(email, pass);
            },
            signOut: function (a) {
              return a.signOut();
            },
            onAuthStateChanged: function (a, cb) {
              return a.onAuthStateChanged(cb);
            },
            updateProfile: function (user, data) {
              return user.updateProfile(data);
            },

            // Firestore helpers
            doc: function (d, col, id) {
              return d.collection(col).doc(id);
            },
            setDoc: function (ref, data) {
              return ref.set(data);
            },
            getDoc: function (ref) {
              return ref.get().then(function (snap) {
                return {
                  exists: function () {
                    return snap.exists;
                  },
                  data: function () {
                    return snap.data();
                  },
                };
              });
            },
            updateDoc: function (ref, data) {
              return ref.update(data);
            },
            serverTimestamp: function () {
              return firebase.firestore.FieldValue.serverTimestamp();
            },
          };

          window._firebaseReady = true;
          console.log("Firebase ready ✓");
        } catch (e) {
          console.error("Firebase init failed:", e.message);
          window._firebaseReady = false;
        }
      })();
    </script>

    <style>
      /* ═══════════════════════════════════════════
   DESIGN SYSTEM — Industrial Dark Terminal
═══════════════════════════════════════════ */
      :root {
        --bg: #080c14;
        --surface: #0e1520;
        --card: #121b28;
        --card2: #16212f;
        --border: #1c2d42;
        --border2: #243548;
        --accent: #f59e0b;
        --accent2: #06b6d4;
        --accent3: #8b5cf6;
        --success: #10b981;
        --error: #ef4444;
        --warn: #f97316;
        --text: #e2e8f0;
        --text2: #94a3b8;
        --code-bg: #060b10;
        --glow: rgba(245, 158, 11, 0.15);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Outfit", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ── Dot Grid Background ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: radial-gradient(
          circle at 1px 1px,
          rgba(6, 182, 212, 0.08) 1px,
          transparent 0
        );
        background-size: 32px 32px;
        pointer-events: none;
        z-index: 0;
      }

      /* ══════════════════════════════════════════
   AUTH SCREEN
══════════════════════════════════════════ */
      #authScreen {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          ellipse at 50% 0%,
          rgba(245, 158, 11, 0.08) 0%,
          var(--bg) 70%
        );
      }

      .auth-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 48px;
        width: 100%;
        max-width: 440px;
        position: relative;
        box-shadow: 0 0 60px rgba(245, 158, 11, 0.08);
      }

      .auth-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        border-radius: 16px 16px 0 0;
      }

      .auth-logo {
        text-align: center;
        margin-bottom: 32px;
      }

      .auth-logo .logo-icon {
        font-size: 48px;
        display: block;
        margin-bottom: 12px;
        filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.5));
      }

      .auth-logo h1 {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .auth-logo h1 span {
        color: var(--accent);
      }

      .auth-logo p {
        font-size: 13px;
        color: var(--text2);
        margin-top: 6px;
      }

      .auth-tabs {
        display: flex;
        gap: 4px;
        background: var(--bg);
        border-radius: 8px;
        padding: 4px;
        margin-bottom: 28px;
      }

      .auth-tab {
        flex: 1;
        padding: 10px;
        font-family: "Outfit", sans-serif;
        font-size: 14px;
        font-weight: 600;
        border: none;
        background: transparent;
        color: var(--text2);
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .auth-tab.active {
        background: var(--card);
        color: var(--accent);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--text2);
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      .form-input {
        width: 100%;
        padding: 12px 16px;
        background: var(--bg);
        border: 1px solid var(--border2);
        border-radius: 8px;
        color: var(--text);
        font-family: "Outfit", sans-serif;
        font-size: 14px;
        transition: border-color 0.2s;
        outline: none;
      }

      .form-input:focus {
        border-color: var(--accent);
      }
      .form-input::placeholder {
        color: var(--border2);
      }

      .btn-auth {
        width: 100%;
        padding: 14px;
        background: var(--accent);
        color: #000;
        font-family: "Outfit", sans-serif;
        font-size: 15px;
        font-weight: 700;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 8px;
      }

      .btn-auth:hover {
        background: #fbbf24;
        box-shadow: 0 8px 24px rgba(245, 158, 11, 0.3);
        transform: translateY(-1px);
      }

      .btn-auth:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .auth-msg {
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 13px;
        display: none;
      }

      .auth-msg.error {
        background: rgba(239, 68, 68, 0.1);
        color: var(--error);
        border: 1px solid rgba(239, 68, 68, 0.2);
        display: block;
      }
      .auth-msg.success {
        background: rgba(16, 185, 129, 0.1);
        color: var(--success);
        border: 1px solid rgba(16, 185, 129, 0.2);
        display: block;
      }

      .demo-note {
        margin-top: 16px;
        padding: 12px;
        background: rgba(6, 182, 212, 0.05);
        border: 1px solid rgba(6, 182, 212, 0.15);
        border-radius: 8px;
        font-size: 12px;
        color: var(--accent2);
        text-align: center;
        line-height: 1.6;
      }

      /* ══════════════════════════════════════════
   MAIN APP LAYOUT
══════════════════════════════════════════ */
      #app {
        display: none;
        height: 100vh;
        position: relative;
        z-index: 1;
      }

      /* ── Header ── */
      header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 200;
        height: 58px;
        background: rgba(14, 21, 32, 0.97);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 16px;
        backdrop-filter: blur(12px);
      }

      .logo {
        font-size: 17px;
        font-weight: 800;
        letter-spacing: -0.5px;
        white-space: nowrap;
      }
      .logo span {
        color: var(--accent);
      }

      .header-sep {
        width: 1px;
        height: 24px;
        background: var(--border);
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text2);
      }

      .user-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #000;
        flex-shrink: 0;
      }

      .header-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .xp-widget {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-family: "JetBrains Mono", monospace;
        color: var(--text2);
      }

      .xp-bar-wrap {
        width: 80px;
        height: 5px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
      }
      .xp-bar-fill {
        height: 100%;
        border-radius: 3px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        transition: width 0.6s ease;
      }

      .level-pill {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
        font-family: "JetBrains Mono", monospace;
        background: rgba(245, 158, 11, 0.12);
        color: var(--accent);
        border: 1px solid rgba(245, 158, 11, 0.25);
      }

      .btn-signout {
        padding: 6px 14px;
        background: transparent;
        border: 1px solid var(--border2);
        border-radius: 6px;
        color: var(--text2);
        font-family: "Outfit", sans-serif;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-signout:hover {
        border-color: var(--error);
        color: var(--error);
      }

      /* ── Layout ── */
      .layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        padding-top: 58px;
        height: 100vh;
      }

      /* ── Sidebar ── */
      .sidebar {
        background: var(--surface);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        padding: 12px 0 80px;
        position: sticky;
        top: 58px;
        height: calc(100vh - 58px);
      }

      .sidebar::-webkit-scrollbar {
        width: 3px;
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .sidebar-module {
        padding: 14px 16px 4px;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text2);
        border-top: 1px solid var(--border);
        margin-top: 4px;
      }

      .sidebar-module:first-child {
        border-top: none;
        margin-top: 0;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 9px 16px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        color: var(--text2);
        transition: all 0.15s;
        border-left: 2px solid transparent;
        position: relative;
      }

      .nav-item:hover {
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
      }
      .nav-item.active {
        background: rgba(245, 158, 11, 0.06);
        color: var(--accent);
        border-left-color: var(--accent);
      }
      .nav-item.completed {
        color: var(--success);
      }
      .nav-item.completed.active {
        color: var(--success);
        border-left-color: var(--success);
      }

      .nav-icon {
        font-size: 15px;
        flex-shrink: 0;
      }
      .nav-title {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav-badge {
        font-size: 10px;
        font-family: "JetBrains Mono", monospace;
        flex-shrink: 0;
      }
      .nav-badge.done {
        color: var(--success);
      }
      .nav-badge.locked {
        color: var(--border2);
      }
      .nav-badge.active {
        color: var(--accent);
      }

      /* ── Main Content ── */
      .main-content {
        overflow-y: auto;
        background: var(--bg);
      }

      .main-content::-webkit-scrollbar {
        width: 4px;
      }
      .main-content::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      /* ══════════════════════════════════════════
   LESSON PAGE
══════════════════════════════════════════ */
      .lesson-page {
        max-width: 900px;
        padding: 36px 40px 80px;
        display: none;
        flex-direction: column;
        gap: 28px;
      }

      .lesson-page.active {
        display: flex;
      }

      /* Lesson Header */
      .lesson-hero {
        display: flex;
        gap: 20px;
        align-items: flex-start;
      }

      .lesson-icon-wrap {
        width: 64px;
        height: 64px;
        flex-shrink: 0;
        border-radius: 14px;
        background: linear-gradient(
          135deg,
          rgba(245, 158, 11, 0.15),
          rgba(6, 182, 212, 0.1)
        );
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
      }

      .lesson-meta-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }

      .pill {
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .pill-beginner {
        background: rgba(16, 185, 129, 0.12);
        color: var(--success);
        border: 1px solid rgba(16, 185, 129, 0.2);
      }
      .pill-intermediate {
        background: rgba(6, 182, 212, 0.12);
        color: var(--accent2);
        border: 1px solid rgba(6, 182, 212, 0.2);
      }
      .pill-advanced {
        background: rgba(139, 92, 246, 0.12);
        color: var(--accent3);
        border: 1px solid rgba(139, 92, 246, 0.2);
      }
      .pill-expert {
        background: rgba(245, 158, 11, 0.12);
        color: var(--accent);
        border: 1px solid rgba(245, 158, 11, 0.2);
      }
      .pill-xp {
        background: rgba(245, 158, 11, 0.08);
        color: var(--accent);
        border: 1px solid rgba(245, 158, 11, 0.15);
      }
      .pill-diff {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text2);
        border: 1px solid var(--border);
      }

      .lesson-title {
        font-size: 26px;
        font-weight: 800;
        line-height: 1.2;
      }

      /* ── Key Points ── */
      .section-header {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 16px;
      }

      .section-header .sh-icon {
        font-size: 18px;
      }

      .keypoints-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .keypoint-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
      }

      .keypoint-card:hover {
        border-color: var(--accent2);
        transform: translateY(-1px);
      }
      .keypoint-card.expanded {
        border-color: var(--accent2);
        background: var(--card2);
      }

      .kp-short {
        font-size: 13px;
        font-weight: 600;
        color: var(--accent2);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .kp-arrow {
        margin-left: auto;
        font-size: 12px;
        color: var(--text2);
        transition: transform 0.2s;
      }
      .keypoint-card.expanded .kp-arrow {
        transform: rotate(180deg);
      }

      .kp-detail {
        font-size: 12.5px;
        line-height: 1.7;
        color: var(--text2);
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
        display: none;
      }
      .keypoint-card.expanded .kp-detail {
        display: block;
      }

      /* ── Code Block ── */
      .code-block {
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .code-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        background: rgba(255, 255, 255, 0.02);
        border-bottom: 1px solid var(--border);
      }

      .code-dots {
        display: flex;
        gap: 6px;
      }
      .cdot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .cdot-r {
        background: #ff5f57;
      }
      .cdot-y {
        background: #febc2e;
      }
      .cdot-g {
        background: #28c840;
      }

      .code-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--text2);
      }

      .btn-copy {
        padding: 4px 12px;
        font-size: 11px;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text2);
        cursor: pointer;
        font-family: "Outfit", sans-serif;
        transition: all 0.15s;
      }
      .btn-copy:hover {
        color: var(--text);
        border-color: var(--border2);
      }
      .btn-copy.copied {
        color: var(--success);
        border-color: var(--success);
      }

      .code-pre {
        padding: 20px;
        overflow-x: auto;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        line-height: 1.9;
        color: #e2e8f0;
        white-space: pre;
        background: var(--code-bg);
      }

      /* Syntax highlight */
      .kw {
        color: #c792ea;
        font-weight: 600;
      }
      .str {
        color: #c3e88d;
      }
      .num {
        color: #f78c6c;
      }
      .com {
        color: #4a6070;
        font-style: italic;
      }
      .fn {
        color: #82aaff;
      }
      .type {
        color: #ffcb6b;
      }
      .op {
        color: #89ddff;
      }
      .var {
        color: #eeffff;
      }
      .lit {
        color: #f07178;
      }

      /* ── Explanation Box ── */
      .explanation-box {
        background: var(--card);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent2);
        border-radius: 0 10px 10px 0;
        padding: 20px 24px;
        font-size: 13.5px;
        line-height: 1.8;
        color: var(--text2);
      }

      .explanation-box strong {
        color: var(--text);
      }

      /* ── Video Cards ── */
      /* ── YouTube Search Panel ── */
      .yt-search-panel {
        background: linear-gradient(135deg, #0f0505, #120808);
        border: 1px solid rgba(255, 60, 60, 0.2);
        border-radius: 14px;
        overflow: hidden;
      }

      .yt-search-top {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 20px 24px;
        border-bottom: 1px solid rgba(255, 60, 60, 0.1);
      }

      .yt-logo-big {
        width: 52px;
        height: 52px;
        flex-shrink: 0;
        background: #ff0000;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        box-shadow: 0 4px 20px rgba(255, 0, 0, 0.3);
      }

      .yt-search-text h4 {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 4px;
      }

      .yt-search-text p {
        font-size: 12px;
        color: var(--text2);
        line-height: 1.5;
      }

      .yt-search-queries {
        padding: 16px 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .yt-query-btn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 60, 60, 0.15);
        border-radius: 9px;
        text-decoration: none;
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        transition: all 0.2s;
        cursor: pointer;
      }

      .yt-query-btn:hover {
        background: rgba(255, 0, 0, 0.08);
        border-color: rgba(255, 60, 60, 0.4);
        transform: translateX(4px);
        color: #ff6666;
      }

      .yt-query-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .yt-query-icon {
        width: 32px;
        height: 32px;
        background: rgba(255, 0, 0, 0.12);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
        border: 1px solid rgba(255, 60, 60, 0.2);
      }

      .yt-query-arrow {
        font-size: 12px;
        color: var(--text2);
        opacity: 0.6;
      }

      .yt-query-btn:hover .yt-query-arrow {
        opacity: 1;
        color: #ff6666;
      }

      .yt-footer-note {
        padding: 10px 24px 14px;
        font-size: 11px;
        color: var(--text2);
        font-family: "JetBrains Mono", monospace;
        border-top: 1px solid rgba(255, 60, 60, 0.08);
      }

      .yt-footer-note a {
        color: #ff6666;
        text-decoration: none;
      }
      .yt-footer-note a:hover {
        text-decoration: underline;
      }

      /* ── Practice Problem ── */
      .problem-box {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .problem-header {
        padding: 16px 20px;
        background: rgba(245, 158, 11, 0.05);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .problem-header h3 {
        font-size: 15px;
        font-weight: 700;
        color: var(--accent);
      }

      .problem-body {
        padding: 20px;
      }

      .problem-desc {
        font-size: 13.5px;
        line-height: 1.8;
        color: var(--text2);
        white-space: pre-line;
        margin-bottom: 16px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
      }

      /* Code Editor */
      .editor-wrap {
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }

      .editor-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        background: rgba(255, 255, 255, 0.02);
        border-bottom: 1px solid var(--border);
      }

      .editor-indicator {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--accent);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .editor-indicator::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        animation: blink 1.5s ease-in-out infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .editor-btns {
        display: flex;
        gap: 8px;
      }

      textarea.code-editor {
        width: 100%;
        min-height: 180px;
        padding: 18px 20px;
        background: var(--code-bg);
        color: #e2e8f0;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        line-height: 1.8;
        border: none;
        outline: none;
        resize: vertical;
        tab-size: 2;
      }

      textarea.code-editor::placeholder {
        color: #1e3248;
      }

      /* AI Response */
      .ai-panel {
        background: var(--card);
        border: 1px solid rgba(139, 92, 246, 0.2);
        border-radius: 10px;
        overflow: hidden;
        display: none;
      }

      .ai-panel.visible {
        display: block;
      }

      .ai-panel-header {
        padding: 12px 18px;
        background: rgba(139, 92, 246, 0.06);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 700;
        color: var(--accent3);
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--accent3);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .ai-thinking {
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--text2);
        font-family: "JetBrains Mono", monospace;
      }

      .ai-body {
        padding: 18px;
        font-size: 13.5px;
        line-height: 1.8;
        color: var(--text2);
        white-space: pre-wrap;
        display: none;
      }

      .ai-body code {
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        background: rgba(255, 255, 255, 0.05);
        padding: 1px 5px;
        border-radius: 3px;
        color: var(--accent2);
      }

      /* Code execution status badge */
      .exec-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        border-radius: 5px;
        font-size: 12px;
        font-weight: 700;
        font-family: "JetBrains Mono", monospace;
        margin-left: 8px;
      }
      .exec-status.success {
        background: rgba(16, 185, 129, 0.12);
        color: var(--success);
        border: 1px solid rgba(16, 185, 129, 0.2);
      }
      .exec-status.partial {
        background: rgba(245, 158, 11, 0.12);
        color: var(--accent);
        border: 1px solid rgba(245, 158, 11, 0.2);
      }
      .exec-status.error {
        background: rgba(239, 68, 68, 0.12);
        color: var(--error);
        border: 1px solid rgba(239, 68, 68, 0.2);
      }

      /* ── MCQ Section ── */
      .mcq-section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .mcq-header {
        padding: 16px 20px;
        background: rgba(6, 182, 212, 0.04);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .mcq-header h3 {
        font-size: 15px;
        font-weight: 700;
        color: var(--accent2);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .mcq-score {
        font-size: 12px;
        color: var(--text2);
        font-family: "JetBrains Mono", monospace;
      }

      .mcq-body {
        padding: 20px;
      }

      .mcq-question {
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
      }

      .mcq-question:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
      }

      .mcq-q-text {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 12px;
        line-height: 1.6;
      }

      .mcq-q-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--accent);
        background: rgba(245, 158, 11, 0.1);
        padding: 2px 7px;
        border-radius: 4px;
        margin-right: 8px;
      }

      .mcq-options {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .mcq-option {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid var(--border);
        cursor: pointer;
        font-size: 13px;
        font-family: "JetBrains Mono", monospace;
        transition: all 0.15s;
        color: var(--text2);
        background: rgba(255, 255, 255, 0.02);
      }

      .mcq-option:hover:not(.answered) {
        border-color: var(--accent2);
        color: var(--text);
        background: rgba(6, 182, 212, 0.04);
      }
      .mcq-option.correct {
        border-color: var(--success) !important;
        background: rgba(16, 185, 129, 0.08) !important;
        color: var(--success) !important;
      }
      .mcq-option.wrong {
        border-color: var(--error) !important;
        background: rgba(239, 68, 68, 0.08) !important;
        color: var(--error) !important;
      }
      .mcq-option.answered {
        cursor: default;
      }

      .mcq-opt-letter {
        width: 24px;
        height: 24px;
        border-radius: 5px;
        background: var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        flex-shrink: 0;
        font-family: "JetBrains Mono", monospace;
      }

      .mcq-explanation {
        margin-top: 8px;
        padding: 8px 12px;
        background: rgba(16, 185, 129, 0.06);
        border-left: 2px solid var(--success);
        border-radius: 0 6px 6px 0;
        font-size: 12px;
        color: var(--success);
        display: none;
      }

      /* ── Output Box ── */
      .output-box {
        background: #020912;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        display: none;
        transition: all 0.3s ease;
      }

      .output-box.visible {
        display: block;
      }

      .output-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 16px;
        background: rgba(255, 255, 255, 0.02);
        border-bottom: 1px solid var(--border);
      }

      .output-topbar-left {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--text2);
      }

      .output-run-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success);
        box-shadow: 0 0 6px var(--success);
        flex-shrink: 0;
      }

      .output-run-dot.running {
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent);
        animation: blink 0.6s ease-in-out infinite;
      }

      .output-run-dot.error {
        background: var(--error);
        box-shadow: 0 0 6px var(--error);
      }

      .output-clear-btn {
        padding: 3px 10px;
        font-size: 10px;
        font-weight: 600;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text2);
        cursor: pointer;
        font-family: "Outfit", sans-serif;
        transition: all 0.15s;
      }
      .output-clear-btn:hover {
        color: var(--error);
        border-color: var(--error);
      }

      .output-content {
        padding: 16px 20px;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        line-height: 1.9;
        color: #a8ff78;
        min-height: 80px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .output-content .out-line {
        display: block;
      }
      .output-content .out-line.err {
        color: var(--error);
      }
      .output-content .out-line.warn {
        color: var(--accent);
      }
      .output-content .out-line.info {
        color: var(--accent2);
      }
      .output-content .out-line.meta {
        color: var(--text2);
        font-style: italic;
      }
      .output-content .out-line.ok {
        color: var(--success);
      }

      .output-status-bar {
        padding: 6px 16px;
        border-top: 1px solid var(--border);
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--text2);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255, 255, 255, 0.01);
      }

      /* ── Ask AI ── */
      .ask-section {
        background: var(--card);
        border: 1px solid rgba(139, 92, 246, 0.15);
        border-radius: 12px;
        overflow: hidden;
      }

      .ask-header {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
        font-weight: 700;
        color: var(--accent3);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .ask-input-row {
        display: flex;
      }

      .ask-input {
        flex: 1;
        padding: 14px 18px;
        background: transparent;
        border: none;
        outline: none;
        font-family: "Outfit", sans-serif;
        font-size: 14px;
        color: var(--text);
      }

      .ask-input::placeholder {
        color: var(--border2);
      }

      .ask-send {
        padding: 14px 18px;
        background: rgba(139, 92, 246, 0.12);
        border: none;
        border-left: 1px solid var(--border);
        color: var(--accent3);
        font-size: 18px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .ask-send:hover {
        background: rgba(139, 92, 246, 0.22);
      }

      .ask-response {
        padding: 16px 20px;
        font-size: 13.5px;
        line-height: 1.8;
        color: var(--text2);
        border-top: 1px solid var(--border);
        white-space: pre-wrap;
        display: none;
      }

      .ask-response.visible {
        display: block;
      }

      /* ── Nav Buttons ── */
      .lesson-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 0 0;
        gap: 12px;
      }

      .progress-track {
        display: flex;
        gap: 4px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
        flex: 1;
      }

      .prog-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--border);
        transition: all 0.25s;
      }
      .prog-dot.done {
        background: var(--success);
      }
      .prog-dot.active {
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent);
      }

      /* ── Buttons ── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 18px;
        font-family: "Outfit", sans-serif;
        font-size: 13px;
        font-weight: 700;
        border-radius: 8px;
        cursor: pointer;
        border: none;
        transition: all 0.15s;
        white-space: nowrap;
      }

      .btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        transform: none !important;
      }
      .btn-primary {
        background: var(--accent);
        color: #000;
      }
      .btn-primary:hover:not(:disabled) {
        background: #fbbf24;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(245, 158, 11, 0.25);
      }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.1);
      }
      .btn-hint {
        background: rgba(6, 182, 212, 0.1);
        color: var(--accent2);
        border: 1px solid rgba(6, 182, 212, 0.2);
      }
      .btn-hint:hover {
        background: rgba(6, 182, 212, 0.18);
      }
      .btn-success {
        background: rgba(16, 185, 129, 0.15);
        color: var(--success);
        border: 1px solid rgba(16, 185, 129, 0.2);
      }
      .btn-run {
        background: rgba(16, 185, 129, 0.12);
        color: var(--success);
        border: 1px solid rgba(16, 185, 129, 0.3);
        position: relative;
        overflow: hidden;
      }
      .btn-run:hover:not(:disabled) {
        background: rgba(16, 185, 129, 0.22);
        box-shadow: 0 4px 16px rgba(16, 185, 129, 0.2);
        transform: translateY(-1px);
      }
      .btn-run.running {
        background: rgba(245, 158, 11, 0.12);
        color: var(--accent);
        border-color: rgba(245, 158, 11, 0.3);
        cursor: not-allowed;
      }

      /* ── Welcome Screen ── */
      .welcome-page {
        padding: 48px 48px 80px;
        max-width: 860px;
      }

      .welcome-hero {
        margin-bottom: 40px;
      }

      .welcome-hero h1 {
        font-size: 50px;
        font-weight: 800;
        line-height: 1.1;
        margin-bottom: 16px;
        letter-spacing: -1px;
      }

      .welcome-hero h1 .grad {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .welcome-hero p {
        font-size: 16px;
        color: var(--text2);
        line-height: 1.7;
        max-width: 560px;
      }

      .welcome-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 32px;
      }

      .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px 16px;
        text-align: center;
      }

      .stat-card .stat-num {
        font-size: 28px;
        font-weight: 800;
        color: var(--accent);
      }
      .stat-card .stat-lbl {
        font-size: 11px;
        color: var(--text2);
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .welcome-modules {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        margin-bottom: 32px;
      }

      .module-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .module-card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .module-card .mc-icon {
        font-size: 26px;
        margin-bottom: 10px;
      }
      .module-card h3 {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .module-card p {
        font-size: 11.5px;
        color: var(--text2);
        line-height: 1.5;
      }
      .module-card .mc-count {
        font-size: 10px;
        color: var(--accent);
        margin-top: 8px;
        font-family: "JetBrains Mono", monospace;
      }

      .btn-big {
        padding: 16px 36px;
        font-size: 16px;
        font-weight: 800;
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-big:hover {
        background: #fbbf24;
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(245, 158, 11, 0.3);
      }

      /* ── Toast ── */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        padding: 14px 20px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
        transform: translateX(200%);
        transition: transform 0.3s ease;
        max-width: 320px;
      }

      .toast.show {
        transform: translateX(0);
      }
      .toast.success {
        background: rgba(16, 185, 129, 0.15);
        border: 1px solid rgba(16, 185, 129, 0.3);
        color: var(--success);
      }
      .toast.error {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: var(--error);
      }
      .toast.info {
        background: rgba(6, 182, 212, 0.15);
        border: 1px solid rgba(6, 182, 212, 0.3);
        color: var(--accent2);
      }

      /* ── Loading overlay ── */
      #loadingOverlay {
        position: fixed;
        inset: 0;
        z-index: 5000;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        transition: opacity 0.4s;
      }

      #loadingOverlay .lo-icon {
        font-size: 48px;
      }
      #loadingOverlay p {
        color: var(--text2);
        font-size: 14px;
      }

      .loading-bar {
        width: 200px;
        height: 3px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }

      .loading-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 2px;
        animation: load 1.5s ease-in-out infinite;
      }

      @keyframes load {
        0% {
          width: 0;
          margin-left: 0;
        }
        50% {
          width: 80%;
          margin-left: 0;
        }
        100% {
          width: 0;
          margin-left: 100%;
        }
      }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .sidebar {
          display: none;
        }
        .lesson-page,
        .welcome-page {
          padding: 20px 20px 60px;
        }
        .keypoints-grid {
          grid-template-columns: 1fr;
        }
        .welcome-stats {
          grid-template-columns: repeat(2, 1fr);
        }
        .welcome-modules {
          grid-template-columns: 1fr;
        }
        header {
          padding: 0 12px;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ════════ LOADING ════════ -->
    <div id="loadingOverlay">
      <div class="lo-icon">🗄️</div>
      <div class="loading-bar"><div class="loading-bar-fill"></div></div>
      <p>Loading PL/SQL Academy...</p>

          codeExample: `DECLARE
  -- Parameterized explicit cursor
  CURSOR c_dept_emps (p_dept_id NUMBER) IS
    SELECT e.employee_id,
           e.first_name || ' ' || e.last_name  AS full_name,
           e.salary,
           d.department_name
    FROM   employees   e
    JOIN   departments d ON e.department_id = d.department_id
    WHERE  e.department_id = p_dept_id
    ORDER  BY e.salary DESC;

  -- Record variable anchored to cursor
  v_emp      c_dept_emps%ROWTYPE;
  v_total    NUMBER := 0;
  v_count    NUMBER := 0;
  v_max_sal  NUMBER := 0;

BEGIN
  -- METHOD 1: Manual OPEN-FETCH-CLOSE
  DBMS_OUTPUT.PUT_LINE('=== Dept 50 Employees (Manual) ===');
  OPEN c_dept_emps(50);
  LOOP
    FETCH c_dept_emps INTO v_emp;
    EXIT WHEN c_dept_emps%NOTFOUND;

    v_count := v_count + 1;
    v_total := v_total + v_emp.salary;
    IF v_emp.salary > v_max_sal THEN
      v_max_sal := v_emp.salary;
    END IF;

    DBMS_OUTPUT.PUT_LINE(
      RPAD(v_emp.full_name, 25) ||
      ' Rs.' || TO_CHAR(v_emp.salary, '99,999')
    );
  END LOOP;
  DBMS_OUTPUT.PUT_LINE('Fetched: ' || c_dept_emps%ROWCOUNT || ' rows');
  CLOSE c_dept_emps;

  -- METHOD 2: Cursor FOR Loop (preferred!)
  DBMS_OUTPUT.PUT_LINE(CHR(10) || '=== Dept 80 (Cursor FOR Loop) ===');
  FOR rec IN c_dept_emps(80) LOOP
    DBMS_OUTPUT.PUT_LINE(rec.full_name || ' — ' || rec.department_name);
  END LOOP; -- auto-closed!

  -- Summary
  DBMS_OUTPUT.PUT_LINE('Count  : ' || v_count);
  DBMS_OUTPUT.PUT_LINE('Average: Rs.' || ROUND(v_total/NULLIF(v_count,0)));
  DBMS_OUTPUT.PUT_LINE('Max Sal: Rs.' || v_max_sal);
END;
/`,

CREATE OR REPLACE PROCEDURE process_employee_raise (
  p_emp_id      IN  employees.employee_id%TYPE,

  p_new_salary  OUT employees.salary%TYPE,
  p_status      OUT VARCHAR2

  v_emp_name     VARCHAR2(100);
  v_max_salary   jobs.max_salary%TYPE;

  -- Private sub-procedure
  PROCEDURE log_change (p_msg VARCHAR2) IS
  BEGIN
    INSERT INTO audit_log (log_date, message)
    VALUES (SYSDATE, p_msg);
  END;

BEGIN
  -- Fetch employee
  SELECT first_name || ' ' || last_name, salary, j.max_salary

  FROM   employees e
  JOIN   jobs j ON e.job_id = j.job_id
  WHERE  employee_id = p_emp_id;

    p_status := 'CAPPED at job maximum: Rs.' || v_max_salary;

CREATE OR REPLACE FUNCTION calculate_emi (
  p_principal  IN NUMBER,
  p_rate       IN NUMBER,    -- annual % rate
  p_months     IN NUMBER
) RETURN NUMBER DETERMINISTIC AS
  v_monthly_rate NUMBER;
  v_emi          NUMBER;
BEGIN
  IF p_principal IS NULL OR p_rate IS NULL OR p_months IS NULL THEN
    RETURN NULL;
  END IF;
  IF p_months <= 0 OR p_rate < 0 THEN
    RAISE_APPLICATION_ERROR(-20001, 'Invalid EMI parameters');
  END IF;

  v_monthly_rate := p_rate / (12 * 100);
  v_emi := p_principal * v_monthly_rate *
           POWER(1 + v_monthly_rate, p_months) /
           (POWER(1 + v_monthly_rate, p_months) - 1);
  RETURN ROUND(v_emi, 2);
END calculate_emi;
/

-- 2. Recursive function
CREATE OR REPLACE FUNCTION factorial(n IN NUMBER)
RETURN NUMBER AS
BEGIN
  IF n <= 1 THEN RETURN 1; END IF;
  RETURN n * factorial(n - 1);
END factorial;
/

  IF p_mobile IS NULL OR LENGTH(p_mobile) < 10 THEN

  END IF;
  RETURN 'XXXXXX' || SUBSTR(p_mobile, -4);

          codeExample: `-- ========================================
-- PACKAGE SPECIFICATION (Public Interface)
-- ========================================
CREATE OR REPLACE PACKAGE employee_mgmt AS

  -- Public constant
  c_max_raise_pct  CONSTANT NUMBER := 30;

  -- Public type
  TYPE t_emp_summary IS RECORD (
    emp_id    NUMBER,
    full_name VARCHAR2(100),
    salary    NUMBER,
    dept      VARCHAR2(50)
  );

  -- Public cursor type
  TYPE t_emp_cursor IS REF CURSOR RETURN t_emp_summary;

  -- Public procedures
  PROCEDURE hire_employee (
    p_name    IN  VARCHAR2,
    p_job     IN  VARCHAR2,
    p_salary  IN  NUMBER,
    p_dept_id IN  NUMBER,
    p_emp_id  OUT NUMBER,
    p_status  OUT VARCHAR2
  );

  PROCEDURE give_raise (
    p_emp_id  IN  NUMBER,
    p_pct     IN  NUMBER DEFAULT 10,
    p_status  OUT VARCHAR2
  );

  -- Overloaded function
  FUNCTION get_employee_info (p_emp_id IN NUMBER) RETURN t_emp_summary;
  FUNCTION get_employee_info (p_email IN VARCHAR2) RETURN t_emp_summary;

  FUNCTION total_dept_salary (p_dept_id IN NUMBER) RETURN NUMBER;

END employee_mgmt;
/

-- ========================================
-- PACKAGE BODY (Implementation)
-- ========================================
CREATE OR REPLACE PACKAGE BODY employee_mgmt AS

  -- Private variable (session-level cache)
  g_last_hired_id  NUMBER;
  g_call_count     NUMBER := 0;

  -- Private procedure (not in spec)
  PROCEDURE audit_action (p_action VARCHAR2, p_emp_id NUMBER) IS
  BEGIN
    INSERT INTO emp_audit (action, emp_id, action_date, done_by)
    VALUES (p_action, p_emp_id, SYSDATE, USER);
  END;

  PROCEDURE hire_employee (p_name VARCHAR2, p_job VARCHAR2,
    p_salary NUMBER, p_dept_id NUMBER, p_emp_id OUT NUMBER, p_status OUT VARCHAR2) IS
  BEGIN
    INSERT INTO employees (employee_id, first_name, job_id, salary, department_id)
    VALUES (emp_seq.NEXTVAL, p_name, p_job, p_salary, p_dept_id)
    RETURNING employee_id INTO p_emp_id;

    g_last_hired_id := p_emp_id;
    g_call_count := g_call_count + 1;
    audit_action('HIRE', p_emp_id);
    COMMIT;
    p_status := 'HIRED: ID=' || p_emp_id;
  EXCEPTION
    WHEN OTHERS THEN p_status := 'ERROR: ' || SQLERRM; ROLLBACK;
  END hire_employee;

  PROCEDURE give_raise (p_emp_id NUMBER, p_pct NUMBER DEFAULT 10, p_status OUT VARCHAR2) IS
    v_old_sal NUMBER;
  BEGIN
    IF p_pct > c_max_raise_pct THEN
      RAISE_APPLICATION_ERROR(-20001, 'Raise exceeds ' || c_max_raise_pct || '%');
    END IF;
    SELECT salary INTO v_old_sal FROM employees WHERE employee_id = p_emp_id;
    UPDATE employees SET salary = salary * (1 + p_pct/100) WHERE employee_id = p_emp_id;
    audit_action('RAISE_' || p_pct || 'PCT', p_emp_id);
    COMMIT;
    p_status := 'Raised from Rs.' || v_old_sal || ' by ' || p_pct || '%';
  EXCEPTION
    WHEN OTHERS THEN p_status := SQLERRM; ROLLBACK;
  END give_raise;

  FUNCTION get_employee_info (p_emp_id NUMBER) RETURN t_emp_summary IS
    v_rec t_emp_summary;
  BEGIN
    SELECT e.employee_id, e.first_name||' '||e.last_name, e.salary, d.department_name
    INTO   v_rec.emp_id, v_rec.full_name, v_rec.salary, v_rec.dept
    FROM   employees e JOIN departments d ON e.department_id=d.department_id
    WHERE  e.employee_id = p_emp_id;
    RETURN v_rec;
  END;

  FUNCTION get_employee_info (p_email VARCHAR2) RETURN t_emp_summary IS
    v_id NUMBER;
  BEGIN
    SELECT employee_id INTO v_id FROM employees WHERE email = p_email;
    RETURN get_employee_info(v_id);  -- calls the other version
  END;

  FUNCTION total_dept_salary (p_dept_id NUMBER) RETURN NUMBER IS
    v_total NUMBER;
  BEGIN
    SELECT SUM(salary) INTO v_total FROM employees WHERE department_id = p_dept_id;
    RETURN NVL(v_total, 0);
  END;

-- Package initialization (runs once per session)
BEGIN
  DBMS_OUTPUT.PUT_LINE('employee_mgmt package loaded. User: ' || USER);
  g_call_count := 0;
END employee_mgmt;
/

-- ==== CALLING THE PACKAGE ====
DECLARE
  v_id      NUMBER;
  v_status  VARCHAR2(200);
  v_info    employee_mgmt.t_emp_summary;
BEGIN
  employee_mgmt.hire_employee('Raj Patel','IT_PROG',60000,60, v_id, v_status);
  DBMS_OUTPUT.PUT_LINE(v_status);

  employee_mgmt.give_raise(v_id, 15, v_status);
  DBMS_OUTPUT.PUT_LINE(v_status);

  v_info := employee_mgmt.get_employee_info(v_id);
  DBMS_OUTPUT.PUT_LINE('Name: ' || v_info.full_name || ' Dept: ' || v_info.dept);

  DBMS_OUTPUT.PUT_LINE('Dept 60 Total Sal: Rs.' || employee_mgmt.total_dept_salary(60));
END;
/`,

            solution: `-- (Full solution in lesson — simplified for display)
CREATE OR REPLACE PACKAGE BODY library_mgmt AS
  PROCEDURE issue_book(p_member_id NUMBER, p_book_id NUMBER, p_issue_date DATE DEFAULT SYSDATE, p_due_date OUT DATE, p_status OUT VARCHAR2) AS
    v_issued NUMBER; v_avail NUMBER;
  BEGIN
    SELECT COUNT(*) INTO v_issued FROM book_issues WHERE member_id=p_member_id AND return_date IS NULL;
    IF v_issued >= c_max_books_per_member THEN p_status:='LIMIT REACHED: '||v_issued||' books issued'; RETURN; END IF;
    SELECT available_copies INTO v_avail FROM books WHERE book_id=p_book_id;
    IF v_avail <= 0 THEN p_status:='NOT AVAILABLE'; RETURN; END IF;
    p_due_date := p_issue_date + 14;
    INSERT INTO book_issues(member_id,book_id,issue_date,due_date) VALUES(p_member_id,p_book_id,p_issue_date,p_due_date);
    UPDATE books SET available_copies=available_copies-1 WHERE book_id=p_book_id;
    COMMIT; p_status:='ISSUED. Due: '||TO_CHAR(p_due_date,'DD-MON-YYYY');
  EXCEPTION WHEN OTHERS THEN p_status:='ERROR: '||SQLERRM; ROLLBACK;
  END;
  FUNCTION books_issued_to(p_member_id NUMBER) RETURN NUMBER AS v NUMBER;
  BEGIN SELECT COUNT(*) INTO v FROM book_issues WHERE member_id=p_member_id AND return_date IS NULL; RETURN v; END;
  FUNCTION is_book_available(p_book_id NUMBER) RETURN BOOLEAN AS v NUMBER;
  BEGIN SELECT available_copies INTO v FROM books WHERE book_id=p_book_id; RETURN v>0; EXCEPTION WHEN OTHERS THEN RETURN FALSE; END;
END library_mgmt;

          codeExample: `-- =====================================================
-- 1. AUDIT TRIGGER (AFTER, Row-level)
-- =====================================================
CREATE OR REPLACE TRIGGER trg_employee_audit
AFTER INSERT OR UPDATE OR DELETE ON employees
FOR EACH ROW
DECLARE
  v_action  VARCHAR2(10);
BEGIN
  IF    INSERTING THEN v_action := 'INSERT';
  ELSIF UPDATING  THEN v_action := 'UPDATE';
  ELSIF DELETING  THEN v_action := 'DELETE';
  END IF;

  INSERT INTO employees_audit (
    audit_id, action_type, emp_id,
    old_salary, new_salary,
    old_dept,  new_dept,
    changed_by, changed_on
  ) VALUES (
    audit_seq.NEXTVAL, v_action,
    NVL(:NEW.employee_id, :OLD.employee_id),
    :OLD.salary,       :NEW.salary,
    :OLD.department_id,:NEW.department_id,
    USER, SYSDATE
  );
END trg_employee_audit;
/

-- =====================================================
-- 2. VALIDATION TRIGGER (BEFORE UPDATE, with WHEN)
-- =====================================================
CREATE OR REPLACE TRIGGER trg_salary_rules
BEFORE UPDATE OF salary ON employees
FOR EACH ROW
WHEN (NEW.salary != OLD.salary)  -- only fires if salary actually changes
BEGIN
  -- Rule 1: No salary decrease
  IF :NEW.salary < :OLD.salary THEN
    RAISE_APPLICATION_ERROR(-20001,
      'Salary cut not allowed! Old: Rs.' || :OLD.salary ||
      ' New: Rs.' || :NEW.salary);
  END IF;

  -- Rule 2: Max 30% raise at once
  IF (:NEW.salary - :OLD.salary) / :OLD.salary > 0.30 THEN
    RAISE_APPLICATION_ERROR(-20002,
      'Raise exceeds 30% in one step. Old: ' || :OLD.salary);
  END IF;

  -- Auto-set last modified date (modify :NEW)
  :NEW.last_modified := SYSDATE;
  :NEW.modified_by   := USER;
END trg_salary_rules;
/

-- =====================================================
-- 3. AUTO-POPULATE TRIGGER (BEFORE INSERT)
-- =====================================================
CREATE OR REPLACE TRIGGER trg_orders_autofill
BEFORE INSERT ON orders
FOR EACH ROW
BEGIN
  -- Auto-generate order ID from sequence
  IF :NEW.order_id IS NULL THEN
    :NEW.order_id := order_seq.NEXTVAL;
  END IF;

  -- Auto-set timestamps
  :NEW.created_at  := SYSDATE;
  :NEW.created_by  := USER;
  :NEW.order_status := NVL(:NEW.order_status, 'PENDING');

  -- Calculate tax automatically
  :NEW.tax_amount := ROUND(:NEW.order_total * 0.18, 2);
  :NEW.grand_total := :NEW.order_total + :NEW.tax_amount;
END trg_orders_autofill;
/

-- =====================================================
-- 4. DDL TRIGGER (schema-level logging)
-- =====================================================
CREATE OR REPLACE TRIGGER trg_ddl_logger
AFTER DDL ON SCHEMA
BEGIN
  INSERT INTO ddl_log (event, object_type, object_name, log_date, user_name)
  VALUES (ORA_SYSEVENT, ORA_DICT_OBJ_TYPE, ORA_DICT_OBJ_NAME, SYSDATE, USER);
END trg_ddl_logger;
/`,

            solution: `CREATE OR REPLACE PROCEDURE audit_table_stats(p_table_name VARCHAR2, p_schema_name VARCHAR2 DEFAULT USER) AS
  v_sql VARCHAR2(4000); v_count NUMBER; v_full_name VARCHAR2(100);
  CURSOR c_cols IS SELECT column_name, data_type FROM all_tab_columns WHERE table_name=UPPER(p_table_name) AND owner=UPPER(p_schema_name) ORDER BY column_id;
  v_min_val VARCHAR2(100); v_max_val VARCHAR2(100); v_avg_val VARCHAR2(100);
BEGIN
  v_full_name := DBMS_ASSERT.SQL_OBJECT_NAME(UPPER(p_schema_name)||'.'||UPPER(p_table_name));
  EXECUTE IMMEDIATE 'SELECT COUNT(*) FROM '||v_full_name INTO v_count;
  DBMS_OUTPUT.PUT_LINE('TABLE: '||UPPER(p_table_name)||' | ROWS: '||v_count);
  FOR col IN c_cols LOOP
    BEGIN
      IF col.data_type IN ('NUMBER','INTEGER','FLOAT') THEN
        EXECUTE IMMEDIATE 'SELECT TO_CHAR(MIN('||col.column_name||')), TO_CHAR(MAX('||col.column_name||')), TO_CHAR(ROUND(AVG('||col.column_name||'),2)) FROM '||v_full_name INTO v_min_val, v_max_val, v_avg_val;
        DBMS_OUTPUT.PUT_LINE('  '||RPAD(col.column_name,20)||' NUMBER  Min:'||v_min_val||' Max:'||v_max_val||' Avg:'||v_avg_val);
      ELSIF col.data_type LIKE 'DATE%' OR col.data_type LIKE 'TIMESTAMP%' THEN
        EXECUTE IMMEDIATE 'SELECT TO_CHAR(MIN('||col.column_name||'),''YYYY-MM-DD''), TO_CHAR(MAX('||col.column_name||'),''YYYY-MM-DD'') FROM '||v_full_name INTO v_min_val, v_max_val;
        DBMS_OUTPUT.PUT_LINE('  '||RPAD(col.column_name,20)||' DATE    From:'||v_min_val||' To:'||v_max_val);
      END IF;
    EXCEPTION WHEN OTHERS THEN DBMS_OUTPUT.PUT_LINE('  '||col.column_name||': (skip - '||SQLERRM||')'); END;
  END LOOP;
EXCEPTION WHEN OTHERS THEN DBMS_OUTPUT.PUT_LINE('Error auditing '||p_table_name||': '||SQLERRM);
END;
